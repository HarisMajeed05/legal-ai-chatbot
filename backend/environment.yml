name: legal-ai-backend
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      - fastapi==0.111.0
      - uvicorn[standard]==0.30.1
      - python-dotenv==1.0.1
      - pydantic==2.7.4
      - pydantic-settings==2.3.4
      - email-validator==2.2.0
      - langchain==0.2.6
      - langchain-community==0.2.6
      - langchain-groq==0.1.5
      - langchain-huggingface==0.0.3
      - langchain-text-splitters==0.2.2
      - faiss-cpu==1.8.0
      - sentence-transformers==3.0.1
      - motor==3.4.0
      - pymongo==4.7.3
      - python-jose[cryptography]==3.3.0
      - passlib[bcrypt]==1.7.4
      - bcrypt==4.0.1
      - pypdf==4.2.0
      - reportlab==4.2.0
      - python-multipart==0.0.9
      # Optional, only needed for OCR on scanned PDFs with no text layer.
      # Also requires the Tesseract OCR engine and Poppler system binaries,
      # installed separately, not through pip. See README for setup.
      - pytesseract==0.3.10
      - pdf2image==1.17.0
